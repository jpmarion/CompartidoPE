name: Publish NuGet

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CompartidoPE.sln

      - name: Build
        run: dotnet build CompartidoPE.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack CompartidoPE/CompartidoPE.csproj --configuration Release --no-build --output artifacts

      - name: Login to NuGet
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: jpmarion

      - name: Publish to NuGet
        run: >-
          dotnet nuget push artifacts/*.nupkg
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
